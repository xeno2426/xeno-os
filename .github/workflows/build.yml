name: Build Xeno OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git dosfstools libisoburn mtools squashfs-tools erofs-utils

      - name: Build ISO
        run: |
          mkdir -p /tmp/xeno-build /tmp/xeno-out
          mkarchiso -v -w /tmp/xeno-build -o /tmp/xeno-out .
        timeout-minutes: 90

      - name: Checksum
        run: cd /tmp/xeno-out && sha256sum *.iso > sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xeno-os-iso
          path: /tmp/xeno-out/
          retention-days: 7

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Xeno OS — Build ${{ github.run_number }}"
          files: /tmp/xeno-out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
