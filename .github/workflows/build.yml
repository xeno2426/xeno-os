name: Build Xeno OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps + archiso
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            squashfs-tools libisoburn1 xorriso dosfstools mtools \
            erofs-utils arch-install-scripts python3-docutils

          git clone --depth=1 https://gitlab.archlinux.org/archlinux/archiso.git /tmp/archiso-src
          sudo make -C /tmp/archiso-src install

      - name: Strip AUR-only stuff from build
        run: |
          sed -i '/\[chaotic-aur\]/,+1d' pacman.conf
          sed -i '/chaotic-mirrorlist\|chaotic-keyring\|^yay$\|^pamac-nosnap$\|^brave-bin$\|^betterlockscreen$/d' packages.x86_64

      - name: Build ISO
        run: |
          mkdir -p /tmp/xeno-build /tmp/xeno-out
          sudo mkarchiso -v -w /tmp/xeno-build -o /tmp/xeno-out .
        timeout-minutes: 90

      - name: Checksum
        run: cd /tmp/xeno-out && sha256sum *.iso > sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xeno-os-iso
          path: /tmp/xeno-out/
          retention-days: 7

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Xeno OS — Build ${{ github.run_number }}"
          files: /tmp/xeno-out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
