-- ─── Xeno OS — Conky Ambient Desktop Widget ─────────────────────────────────
-- Subtle bottom-left overlay, complements polybar without duplicating it.

conky.config = {
    -- Positioning
    alignment          = 'bottom_left',
    gap_x              = 32,
    gap_y              = 32,

    -- Window
    own_window         = true,
    own_window_type    = 'desktop',
    own_window_hints   = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_colour  = '#1e1e2e',
    own_window_argb_visual = true,
    own_window_argb_value  = 0,

    -- Appearance
    background         = false,
    double_buffer      = true,
    draw_shades        = false,
    draw_outline       = false,
    draw_borders       = false,

    -- Font
    use_xft            = true,
    font               = 'JetBrainsMono Nerd Font:size=9',
    xftalpha           = 0.9,

    -- Updates
    update_interval    = 2.0,
    total_run_times    = 0,

    -- Colours
    default_color      = '#cdd6f4',
    color1             = '#89b4fa',   -- blue
    color2             = '#a6adc8',   -- subtext
    color3             = '#a6e3a1',   -- green
    color4             = '#f9e2af',   -- yellow
    color5             = '#f38ba8',   -- red
    color6             = '#94e2d5',   -- teal
}

conky.text = [[
${color1}┌─────────────────────────┐
${color1}│  ${color2}󰣇  Xeno OS              ${color1}│
${color1}├─────────────────────────┤${color}
${color1}│${color}  󰻠 CPU   ${color4}${cpu cpu0}%${goto 160}${color6}${cpubar cpu0 8,60}  ${color1}│
${color1}│${color}  󰍛 RAM   ${color4}${memperc}%${goto 160}${color6}${membar 8,60}  ${color1}│
${color1}│${color}  󱖼 Disk  ${color4}${fs_used_perc /}%${goto 160}${color6}${fs_bar 8,60 /}  ${color1}│
${color1}├─────────────────────────┤${color}
${color1}│${color}  󰓅 Up    ${color3}${upspeed}${goto 160}${color2}${upspeedgraph 8,60}  ${color1}│
${color1}│${color}  󰇚 Down  ${color3}${downspeed}${goto 160}${color2}${downspeedgraph 8,60}  ${color1}│
${color1}├─────────────────────────┤${color}
${color1}│${color}  󰔚 Uptime  ${color2}${uptime_short}          ${color1}│
${color1}│${color}  󰋊 Kernel  ${color2}${kernel}   ${color1}│
${color1}└─────────────────────────┘
]]
