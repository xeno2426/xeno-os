# ─── Backend ──────────────────────────────────────────────────────────────────
backend        = "glx";
glx-no-stencil = true;
vsync          = true;

# ─── Corners ──────────────────────────────────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Plank'"
];

# ─── Shadows ──────────────────────────────────────────────────────────────────
shadow              = true;
shadow-radius       = 20;
shadow-offset-x     = -20;
shadow-offset-y     = -20;
shadow-opacity      = 0.45;
shadow-color        = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Plank'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ─── Blur (Frosted Glass) ─────────────────────────────────────────────────────
blur-method          = "dual_kawase";
blur-strength        = 6;
blur-background      = true;
blur-background-frame = true;
blur-kern            = "3x3box";
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Plank'"
];

# ─── Fading (Smooth Transitions) ──────────────────────────────────────────────
fading         = true;
fade-delta     = 6;
fade-in-step   = 0.04;
fade-out-step  = 0.04;
fade-exclude   = [
    "class_g = 'Plank'"
];

# ─── Opacity ──────────────────────────────────────────────────────────────────
inactive-opacity           = 0.92;
active-opacity             = 1.0;
frame-opacity              = 1.0;
inactive-opacity-override  = false;
opacity-rule = [
    "100:class_g = 'Brave-browser'",
    "100:class_g = 'Thunar'",
    "95:class_g = 'kitty' && focused",
    "80:class_g = 'kitty' && !focused",
    "100:class_g = 'Rofi'",
    "0:class_g = 'Plank'"
];

# ─── Focus ────────────────────────────────────────────────────────────────────
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;
use-ewmh-active-win    = true;

# ─── General ──────────────────────────────────────────────────────────────────
dbe             = false;
unredir-if-possible = false;
log-level       = "warn";
