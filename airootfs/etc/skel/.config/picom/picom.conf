# Premium Visuals for Xeno OS
backend = "glx";
vsync = true;

# Rounded Corners
corner-radius = 12;

# Shadows
shadow = true;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.5;

# Blur (Frosted Glass Effect)
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;

# Fading (Smooth window transitions)
fading = true;
fade-delta = 4;
