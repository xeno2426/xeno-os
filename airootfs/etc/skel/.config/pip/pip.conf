[global]
# Use PyPI (fastest general mirror)
index-url        = https://pypi.org/simple

# Progress bar style
progress_bar     = on

# Don't check for pip version on every install
disable-pip-version-check = true

# Always upgrade dependencies
upgrade-strategy = eager

# Parallel downloads
# (uncomment if using pip >= 23)
# jobs = 4

[install]
# Prefer binary wheels — avoids compilation
prefer-binary    = true

# Respect .python-version
python           = python3
