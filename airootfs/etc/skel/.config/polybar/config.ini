; ╔═══════════════════════════════════════════════════════════════╗
; ║              Xeno OS — Polybar (macOS Menu Bar Style)         ║
; ║              Theme: Catppuccin Mocha                          ║
; ╚═══════════════════════════════════════════════════════════════╝

; ─── Color Palette ────────────────────────────────────────────────────────────
[colors]
base       = #1e1e2e
mantle     = #181825
crust      = #11111b
surface0   = #313244
surface1   = #45475a
surface2   = #585b70
overlay0   = #6c7086
overlay1   = #7f849c
text       = #cdd6f4
subtext    = #a6adc8
blue       = #89b4fa
lavender   = #b4befe
sapphire   = #74c7ec
sky        = #89dceb
teal       = #94e2d5
green      = #a6e3a1
yellow     = #f9e2af
peach      = #fab387
maroon     = #eba0ac
red        = #f38ba8
pink       = #f5c2e7
mauve      = #cba6f7
flamingo   = #f2cdcd
rosewater  = #f5e0dc

; Semi-transparent bar background
bar-bg     = #dd1e1e2e
bar-sep    = #40585b70
pill-bg    = #44313244

; ─── Main Bar ─────────────────────────────────────────────────────────────────
[bar/xeno-bar]
monitor              = 
width                = 100%
height               = 36pt
offset-x             = 0
offset-y             = 0
radius               = 0

background           = ${colors.bar-bg}
foreground           = ${colors.text}

; Subtle bottom border line
line-size            = 1pt
line-color           = ${colors.surface0}
border-bottom-size   = 1pt
border-bottom-color  = ${colors.surface0}

padding-left         = 2
padding-right        = 2
module-margin-left   = 0
module-margin-right  = 0

; JetBrainsMono Nerd Font for icons + text
font-0 = JetBrainsMono Nerd Font:size=10:weight=Regular;3
font-1 = JetBrainsMono Nerd Font:size=12:weight=Bold;3
font-2 = JetBrainsMono Nerd Font:size=8;2
font-3 = Font Awesome 6 Free:size=10;3
font-4 = Font Awesome 6 Free Solid:size=10;3

; ─── Module Layout (macOS style) ──────────────────────────────────────────────
; Left:   [Logo] [Workspaces] [Window Title]
; Center: [Date & Time]
; Right:  [CPU] [RAM] [Net] [Vol] [Bat] [Tray] [Power]

modules-left   = xeno-logo sep workspaces sep xwindow
modules-center = date
modules-right  = cpu sep memory sep network sep pulseaudio sep battery sep tray powermenu

; System tray
tray-position    = none
tray-padding     = 6
tray-background  = ${colors.bar-bg}

wm-restack       = bspwm
override-redirect = false

cursor-click     = pointer
cursor-scroll    = ns-resize

enable-ipc       = true


; ─── Xeno Logo ────────────────────────────────────────────────────────────────
[module/xeno-logo]
type             = custom/text
content          = "  󰣇 "
content-foreground = ${colors.blue}
content-font     = 2
click-left       = rofi -show drun -show-icons


; ─── Separator ────────────────────────────────────────────────────────────────
[module/sep]
type             = custom/text
content          = " │ "
content-foreground = ${colors.bar-sep}
content-font     = 3


; ─── Workspaces (bspwm) ───────────────────────────────────────────────────────
[module/workspaces]
type             = internal/bspwm
pin-workspaces   = true
enable-click     = true
enable-scroll    = true
reverse-scroll   = false

; Focused workspace — filled pill
label-focused              = " %name% "
label-focused-foreground   = ${colors.base}
label-focused-background   = ${colors.blue}
label-focused-padding      = 0

; Occupied (has windows)
label-occupied             = " %name% "
label-occupied-foreground  = ${colors.text}
label-occupied-padding     = 0

; Urgent
label-urgent               = " %name% "
label-urgent-foreground    = ${colors.base}
label-urgent-background    = ${colors.red}
label-urgent-padding       = 0

; Empty workspace
label-empty                = " %name% "
label-empty-foreground     = ${colors.surface2}
label-empty-padding        = 0


; ─── Active Window Title ──────────────────────────────────────────────────────
[module/xwindow]
type             = internal/xwindow
label            = %title:0:48:…%
label-foreground = ${colors.subtext}


; ─── Date & Time (center — macOS style) ──────────────────────────────────────
[module/date]
type             = internal/date
interval         = 1

date             = %a %d %b
time             = %H:%M

; Two-line style: bold time, smaller date above
format           = <label>
label            = %date%  %time%
label-font       = 2
label-foreground = ${colors.text}


; ─── CPU ──────────────────────────────────────────────────────────────────────
[module/cpu]
type                    = internal/cpu
interval                = 2
format                  = <label>
format-prefix           = "󰻠 "
format-prefix-foreground = ${colors.blue}
label                   = %percentage%%
label-foreground        = ${colors.text}
warn-percentage         = 80
format-warn-prefix      = "󰻠 "
format-warn-prefix-foreground = ${colors.red}
label-warn              = %percentage%%
label-warn-foreground   = ${colors.red}


; ─── Memory ───────────────────────────────────────────────────────────────────
[module/memory]
type                    = internal/memory
interval                = 3
format                  = <label>
format-prefix           = "󰍛 "
format-prefix-foreground = ${colors.teal}
label                   = %percentage_used%%
label-foreground        = ${colors.text}
warn-percentage         = 85
label-warn              = %percentage_used%%
label-warn-foreground   = ${colors.red}


; ─── Network ──────────────────────────────────────────────────────────────────
[module/network]
type             = internal/network
interface-type   = wireless
interval         = 3

format-connected          = <label-connected>
format-connected-prefix   = "󰤨 "
format-connected-prefix-foreground = ${colors.green}
label-connected           = %downspeed:6%
label-connected-foreground = ${colors.text}

format-disconnected          = <label-disconnected>
format-disconnected-prefix   = "󰤭 "
format-disconnected-prefix-foreground = ${colors.surface2}
label-disconnected           = offline
label-disconnected-foreground = ${colors.surface2}


; ─── Volume ───────────────────────────────────────────────────────────────────
[module/pulseaudio]
type                    = internal/pulseaudio
use-ui-max              = false
interval                = 2

format-volume           = <label-volume>
format-volume-prefix    = "󰕾 "
format-volume-prefix-foreground = ${colors.yellow}
label-volume            = %percentage%%
label-volume-foreground = ${colors.text}

format-muted            = <label-muted>
label-muted             = "󰖁 muted"
label-muted-foreground  = ${colors.surface2}

click-right             = pavucontrol


; ─── Battery ──────────────────────────────────────────────────────────────────
[module/battery]
type             = internal/battery
battery          = BAT0
adapter          = AC
full-at          = 98
low-at           = 15
poll-interval    = 10

; Charging
format-charging          = <label-charging>
format-charging-prefix   = "󰂄 "
format-charging-prefix-foreground = ${colors.green}
label-charging           = %percentage%%
label-charging-foreground = ${colors.text}

; Discharging
format-discharging       = <ramp-capacity> <label-discharging>
label-discharging        = %percentage%%
label-discharging-foreground = ${colors.text}

; Full
format-full              = <label-full>
format-full-prefix       = "󰁹 "
format-full-prefix-foreground = ${colors.green}
label-full               = Full
label-full-foreground    = ${colors.green}

; Low
format-low               = <label-low>
format-low-prefix        = "󰁺 "
format-low-prefix-foreground = ${colors.red}
label-low                = %percentage%% LOW
label-low-foreground     = ${colors.red}

; Battery ramp icons
ramp-capacity-0          = 󰁺
ramp-capacity-1          = 󰁻
ramp-capacity-2          = 󰁼
ramp-capacity-3          = 󰁽
ramp-capacity-4          = 󰁾
ramp-capacity-5          = 󰁿
ramp-capacity-6          = 󰂀
ramp-capacity-7          = 󰂁
ramp-capacity-8          = 󰂂
ramp-capacity-9          = 󰂃
ramp-capacity-foreground = ${colors.yellow}


; ─── System Tray ──────────────────────────────────────────────────────────────
[module/tray]
type = internal/tray
icon-size = 18
tray-spacing = 6px
tray-background = ${colors.bar-bg}


; ─── Power Menu ───────────────────────────────────────────────────────────────
[module/powermenu]
type            = custom/menu
expand-right    = false
format-spacing  = 1

label-open          = "  󰐥  "
label-open-foreground = ${colors.red}
label-close         = "  ✕  "
label-close-foreground = ${colors.subtext}
label-separator     = "|"
label-separator-foreground = ${colors.surface2}

; Level 0 — main
menu-0-0         = " 󰜉  Reboot "
menu-0-0-exec    = menu-open-1
menu-0-1         = " 󰐥  Shutdown "
menu-0-1-exec    = menu-open-2
menu-0-2         = " 󰍃  Logout "
menu-0-2-exec    = menu-open-3

; Level 1 — confirm reboot
menu-1-0         = "Yes, Reboot"
menu-1-0-exec    = systemctl reboot
menu-1-1         = "Cancel"
menu-1-1-exec    = menu-open-0

; Level 2 — confirm shutdown
menu-2-0         = "Yes, Shutdown"
menu-2-0-exec    = systemctl poweroff
menu-2-1         = "Cancel"
menu-2-1-exec    = menu-open-0

; Level 3 — confirm logout
menu-3-0         = "Yes, Logout"
menu-3-0-exec    = bspc quit
menu-3-1         = "Cancel"
menu-3-1-exec    = menu-open-0


; ─── Settings ─────────────────────────────────────────────────────────────────
[settings]
screenchange-reload  = true
pseudo-transparency  = true
compositing-background = over
compositing-foreground = over
compositing-overline  = over
compositing-underline = over
compositing-border    = over
