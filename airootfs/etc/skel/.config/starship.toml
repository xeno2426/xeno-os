# ─── Xeno OS — Starship Prompt ───────────────────────────────────────────────
# Style: Clean, informative, Catppuccin Mocha palette

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$docker_context\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = true

[os]
disabled = false
style    = "bold blue"
[os.symbols]
Arch  = " "
Linux = " "

[username]
show_always = false
style_user  = "bold cyan"
style_root  = "bold red"
format      = "[$user]($style) "

[hostname]
ssh_only = true
style    = "bold green"
format   = "at [$hostname]($style) "

[directory]
style             = "bold blue"
format            = "in [$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo  = true
read_only         = " 󰌾"
read_only_style   = "red"
home_symbol       = "~"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "

[git_branch]
symbol    = " "
style     = "bold mauve"
format    = "on [$symbol$branch]($style) "
[git_status]
style     = "bold red"
format    = "([$all_status$ahead_behind]($style) )"
conflicted = "󰩌 "
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "󰋗 "
stashed    = " "
modified   = " "
staged     = "[ $count](green)"
renamed    = "󰑕 "
deleted    = " "

[python]
symbol        = " "
style         = "bold yellow"
format        = "[$symbol($version )(\\($virtualenv\\) )]($style)"
detect_files  = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol       = " "
style        = "bold green"
format       = "[$symbol($version )]($style)"
detect_files = ["package.json", ".node-version"]

[rust]
symbol  = " "
style   = "bold orange"
format  = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

[fill]
symbol = " "

[cmd_duration]
min_time   = 2000
style      = "bold yellow"
format     = "took [$duration]($style) "
show_milliseconds = false

[time]
disabled    = false
format      = "[$time]($style) "
style       = "bold subtext0"
time_format = "%H:%M"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold lavender)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

palette = "catppuccin_mocha"
