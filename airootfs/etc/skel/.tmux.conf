# ╔══════════════════════════════════════════════════════════════════╗
# ║               Xeno OS — tmux configuration                       ║
# ║  Theme: Catppuccin Mocha   Prefix: Ctrl+Space                    ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g buffer-limit 20
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g default-shell /bin/zsh

# ─── Status bar refresh ───────────────────────────────────────────────────────
set -g status-interval 2

# ─── Key Bindings ─────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also support Alt+arrow without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n S-Left  previous-window
bind -n S-Right next-window
bind Tab last-window

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill without confirmation
bind x kill-pane
bind X kill-window
bind Q kill-session

# Copy mode (vi keys)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind p paste-buffer

# Session management
bind S choose-session
bind N new-session
bind D detach-client

# Synchronise panes toggle
bind a setw synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# ─── Catppuccin Mocha Colours ─────────────────────────────────────────────────
thm_base="#1e1e2e"
thm_mantle="#181825"
thm_crust="#11111b"
thm_surface0="#313244"
thm_surface1="#45475a"
thm_surface2="#585b70"
thm_overlay0="#6c7086"
thm_text="#cdd6f4"
thm_subtext="#a6adc8"
thm_blue="#89b4fa"
thm_lavender="#b4befe"
thm_mauve="#cba6f7"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_red="#f38ba8"
thm_peach="#fab387"
thm_teal="#94e2d5"

# ─── Pane Borders ─────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines        single

# ─── Status Bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-justify  left
set -g status-style    "fg=#cdd6f4,bg=#181825"

# Left section — session name
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] 󱄅 #S #[fg=#89b4fa,bg=#313244,nobold]#[fg=#cdd6f4,bg=#313244] #{?client_prefix,#[fg=#f9e2af]⌨  ,}#[fg=#313244,bg=#181825]"

# Right section — user, date, time
set -g status-right-length 80
set -g status-right "#[fg=#313244,bg=#181825]#[fg=#a6adc8,bg=#313244] %a %d %b #[fg=#45475a,bg=#313244]│#[fg=#cdd6f4,bg=#313244] %H:%M #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold]  #(whoami) "

# Window tabs
set -g window-status-separator ""
set -g window-status-format         "#[fg=#181825,bg=#181825]#[fg=#a6adc8,bg=#313244] #I  #W #[fg=#313244,bg=#181825]"
set -g window-status-current-format "#[fg=#181825,bg=#181825]#[fg=#1e1e2e,bg=#89b4fa,bold] #I  #W #[fg=#89b4fa,bg=#181825]"
set -g window-status-activity-style "fg=#f9e2af"
set -g window-status-bell-style     "fg=#f38ba8,bold"

# ─── Message / Command line ───────────────────────────────────────────────────
set -g message-style        "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# ─── Mode (copy, visual) ──────────────────────────────────────────────────────
set -g mode-style "fg=#1e1e2e,bg=#89b4fa"

# ─── Clock ────────────────────────────────────────────────────────────────────
set -g clock-mode-colour "#89b4fa"
set -g clock-mode-style  24
